# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Dell Inspiron 14 5430"                    # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 12                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.13"                      # python --version
  os: "Windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 70min               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "ChatGPT"        # e.g. for architecture discussion, code review
    # e.g. for autocomplete
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  Used ChatGPT for architecture discussion, scoring-function design,
  debugging Python issues, and ranking-system improvements.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Built a hybrid candidate-ranking system combining semantic retrieval
  and rule-based reranking. Candidate profiles were embedded using
  SentenceTransformer (all-MiniLM-L6-v2) and compared against the job
  description using cosine similarity. Additional scoring components
  included experience relevance, title relevance, retrieval/ranking
  experience, behavioral signals, platform activity, location fit,
  career stability, and company background. Negative penalties were
  applied to clearly irrelevant profiles. The objective was to
  understand the intent of the JD rather than perform simple keyword
  matching, aligning with the challenge requirement of identifying
  candidates who have actually built ranking, search, and retrieval
  systems in production.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: false        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
